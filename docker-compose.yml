version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: horse_app_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-horseapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-horseapp123}
      POSTGRES_DB: ${POSTGRES_DB:-horseapp}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-horseapp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Redis for caching (future use)
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data

volumes:
  postgres_data:
  # redis_data:

networks:
  default:
    name: horse_app_network
